<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}DocTracker{% endblock %}</title>
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<style>
  :root {
    --bg: #edf4f2;
    --surface: #ffffff;
    --surface-soft: #f5f8f7;
    --line: #d7e2df;
    --line-strong: #b8c8c4;
    --text: #17201d;
    --muted: #62736f;
    --primary: #0f766e;
    --primary-dark: #0b5f59;
    --accent: #c0842d;
    --accent-soft: #fff1d6;
    --danger: #b42318;
    --danger-dark: #8f1d14;
    --success: #167a46;
    --warning: #9a6700;
    --nav: #10231f;
    --shadow: 0 18px 50px rgba(16, 35, 31, .09);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { min-height: 100%; }
  body {
    min-height: 100vh;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    line-height: 1.5;
    background:
      radial-gradient(circle at top left, rgba(15, 118, 110, .11), transparent 32rem),
      radial-gradient(circle at 78% 0%, rgba(192, 132, 45, .12), transparent 28rem),
      linear-gradient(180deg, #fbfdfb 0%, var(--bg) 48%, #e6efec 100%);
    color: var(--text);
  }
  a { color: var(--primary); text-decoration: none; }
  a:hover { color: var(--primary-dark); text-decoration: underline; }

  nav {
    position: sticky;
    top: 0;
    z-index: 10;
    min-height: 60px;
    padding: 0 28px;
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(16, 35, 31, .97);
    color: #fff;
    box-shadow: 0 10px 30px rgba(16, 35, 31, .22);
    backdrop-filter: blur(12px);
  }
  nav .brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-right: 28px;
    color: #fff;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 0;
  }
  nav .brand::before {
    content: "";
    width: 30px;
    height: 34px;
    border-radius: 8px;
    background:
      linear-gradient(135deg, rgba(255,255,255,.92), rgba(255,255,255,0) 42%) top left / 16px 16px no-repeat,
      linear-gradient(90deg, rgba(255,255,255,.78), rgba(255,255,255,.78)) 8px 12px / 14px 2px no-repeat,
      linear-gradient(90deg, rgba(255,255,255,.58), rgba(255,255,255,.58)) 8px 18px / 12px 2px no-repeat,
      linear-gradient(90deg, rgba(255,255,255,.42), rgba(255,255,255,.42)) 8px 24px / 10px 2px no-repeat,
      linear-gradient(180deg, #2dd4bf, var(--primary));
    box-shadow:
      0 0 0 1px rgba(255,255,255,.16),
      0 10px 22px rgba(45, 212, 191, .18),
      inset 0 -5px 0 rgba(16, 35, 31, .14);
    transform-origin: 50% 80%;
    animation: logo-float 3.8s ease-in-out infinite;
  }
  nav a {
    min-height: 38px;
    padding: 0 13px;
    display: inline-flex;
    align-items: center;
    border-radius: 6px;
    color: #cbd5e1;
    font-size: 13px;
    font-weight: 600;
  }
  nav a:hover { background: rgba(255,255,255,.09); color: #fff; text-decoration: none; }
  nav .spacer { flex: 1; }
  nav .user {
    margin-right: 6px;
    color: #d6e3df;
    font-size: 12px;
    padding: 6px 10px;
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 999px;
  }

  .container {
    width: min(1180px, calc(100% - 32px));
    margin: 0 auto;
    padding: 28px 0 44px;
  }
  .page-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 22px;
  }
  .page-header h1 { color: var(--text); font-size: 26px; line-height: 1.15; font-weight: 800; letter-spacing: 0; }
  .page-kicker { margin-top: 5px; color: var(--muted); font-size: 13px; }

  .card {
    background: rgba(255,255,255,.96);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 22px;
    margin-bottom: 18px;
    box-shadow: 0 1px 2px rgba(16, 35, 31, .05);
  }
  .card h2 {
    color: var(--text);
    font-size: 16px;
    font-weight: 750;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--line);
  }
  .card.flush { padding: 0; overflow: hidden; }
  .auth-card { max-width: 420px; margin: 68px auto; box-shadow: var(--shadow); }
  .form-card { max-width: 760px; }
  .danger-card { max-width: 500px; margin: 60px auto; box-shadow: var(--shadow); }

  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; margin-bottom: 22px; }
  .stat {
    position: relative;
    overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 18px;
    box-shadow: 0 1px 2px rgba(16, 35, 31, .05);
  }
  .stat::before { content: ""; position: absolute; inset: 0 auto 0 0; width: 4px; background: linear-gradient(180deg, var(--primary), var(--accent)); opacity: .78; }
  .stat .num { color: var(--text); font-size: 30px; line-height: 1; font-weight: 800; }
  .stat .label { margin-top: 7px; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; font-weight: 750; }

  .badge {
    display: inline-flex;
    align-items: center;
    min-height: 24px;
    padding: 3px 9px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: .04em;
    white-space: nowrap;
  }
  .badge-draft    { background: #e9f0ee; color: #52625e; }
  .badge-review   { background: var(--accent-soft); color: #8a5a17; }
  .badge-approved { background: #dff7ea; color: #146c40; }
  .badge-archived { background: #eef1f0; color: #6a7774; }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 760px; }
  th {
    background: var(--surface-soft);
    color: var(--muted);
    padding: 11px 14px;
    border-bottom: 1px solid var(--line);
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .06em;
    font-weight: 800;
  }
  td { padding: 13px 14px; border-bottom: 1px solid #eaf0ee; vertical-align: middle; }
  tbody tr:hover td { background: #f8fcfa; }
  tbody tr:last-child td { border-bottom: none; }

  .form-group { margin-bottom: 16px; }
  label { display: block; margin-bottom: 6px; color: #334155; font-size: 12px; font-weight: 800; }
  input[type=text], input[type=password], input[type=date], input[type=email],
  input[type=file], select, textarea {
    width: 100%;
    min-height: 40px;
    padding: 9px 11px;
    border: 1px solid var(--line-strong);
    border-radius: 6px;
    background: #fff;
    color: var(--text);
    font: inherit;
    transition: border-color .15s ease, box-shadow .15s ease, background .15s ease;
  }
  input[type=file] { padding: 8px; }
  textarea { min-height: 96px; resize: vertical; }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(15, 118, 110, .14);
  }
  .form-row { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
  .form-help { display: block; margin-top: 6px; color: var(--muted); font-size: 12px; }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    min-height: 38px;
    padding: 8px 15px;
    border: 1px solid transparent;
    border-radius: 6px;
    font: inherit;
    font-size: 13px;
    font-weight: 750;
    cursor: pointer;
    transition: background .15s ease, border-color .15s ease, color .15s ease, transform .15s ease;
  }
  .btn:hover { transform: translateY(-1px); text-decoration: none; }
  .btn-primary { background: var(--primary); color: #fff; box-shadow: 0 8px 18px rgba(15, 118, 110, .18); }
  .btn-primary:hover { background: var(--primary-dark); color: #fff; }
  .btn-secondary { background: #fff; color: #334155; border-color: var(--line-strong); }
  .btn-secondary:hover { background: var(--surface-soft); color: var(--text); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: var(--danger-dark); color: #fff; }
  .btn-sm { min-height: 30px; padding: 5px 10px; font-size: 12px; }
  .btn-block { width: 100%; }
  .actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }

  .alert { padding: 12px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; font-weight: 650; }
  .alert-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
  .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
  .inline-alert { margin-bottom: 12px; }

  .filter-bar {
    background: rgba(255,255,255,.96);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
    display: grid;
    grid-template-columns: minmax(220px, 2fr) repeat(3, minmax(150px, 1fr)) auto;
    gap: 12px;
    align-items: end;
  }
  .filter-bar .form-group { margin-bottom: 0; }

  .detail-grid, .category-grid { display: grid; grid-template-columns: minmax(0, 1fr) 340px; gap: 18px; align-items: start; }
  .detail-meta { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 12px; margin: 18px 0 4px; }
  .meta-item {
    padding: 13px;
    background: var(--surface-soft);
    border: 1px solid #e7efec;
    border-radius: 7px;
  }
  .meta-item .meta-label { margin-bottom: 4px; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; font-weight: 800; }
  .meta-item .meta-value { color: var(--text); font-weight: 700; }
  .document-meta-line { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-bottom: 16px; }
  .document-description { color: #334155; margin-bottom: 16px; max-width: 76ch; }

  .comment { padding: 12px 0; border-bottom: 1px solid #e7efec; }
  .comment:last-child { border-bottom: none; }
  .comment .comment-meta { margin-bottom: 5px; color: var(--muted); font-size: 12px; font-weight: 650; }
  .comment .comment-text { color: #334155; }
  .history-item { display: grid; grid-template-columns: 74px 1fr; gap: 12px; padding: 10px 0; border-bottom: 1px solid #e7efec; color: var(--muted); font-size: 12px; }
  .history-item:last-child { border-bottom: none; }

  .empty { text-align: center; color: var(--muted); padding: 46px 22px; background: linear-gradient(180deg, #fff, #f7fbf9); }
  .table-status { padding: 14px 16px; display: flex; justify-content: space-between; gap: 12px; align-items: center; color: var(--muted); font-size: 12px; border-bottom: 1px solid var(--line); background: #fff; }
  .result-count { color: #2d403a; font-weight: 800; }
  .htmx-indicator { opacity: 0; transition: opacity .15s ease; }
  .htmx-request .htmx-indicator, .htmx-request.htmx-indicator { opacity: 1; }
  .is-loading { display: inline-flex; align-items: center; gap: 8px; color: var(--muted); font-size: 12px; font-weight: 700; }
  .is-loading::before {
    content: "";
    width: 12px;
    height: 12px;
    border: 2px solid var(--line-strong);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin .75s linear infinite;
  }
  .fade-in { animation: fade-in .18s ease-out; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fade-in {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes logo-float {
    0%, 100% { transform: translateY(0) rotate(-2deg); filter: saturate(1); }
    45% { transform: translateY(-3px) rotate(2deg); filter: saturate(1.16); }
  }
  .tag { display: inline-flex; align-items: center; margin: 2px; padding: 3px 8px; border-radius: 999px; background: #e3f6f1; color: #0f766e; font-size: 11px; font-weight: 700; }
  .text-right { text-align: right; }
  .text-muted { color: var(--muted); }
  .mt-2 { margin-top: 8px; }
  .mt-3 { margin-top: 16px; }
  .flex { display: flex; gap: 8px; align-items: center; }
  .errorlist { margin-top: 5px; color: var(--danger); font-size: 12px; list-style: none; }
  .auth-footer { margin-top: 16px; color: var(--muted); font-size: 13px; text-align: center; }
  .auth-title { text-align: center; font-size: 20px; }

  @media (max-width: 820px) {
    nav { position: static; flex-wrap: wrap; height: auto; padding: 12px 16px; }
    nav .brand { width: 100%; margin-right: 0; }
    nav .spacer { display: none; }
    nav .user { margin-left: auto; }
    .container { width: min(100% - 24px, 1180px); padding-top: 20px; }
    .page-header { align-items: stretch; flex-direction: column; }
    .page-header .btn, .page-header .actions { width: 100%; }
    .page-header .actions .btn { flex: 1; }
    .form-row, .detail-grid, .category-grid { grid-template-columns: 1fr; }
    .filter-bar { grid-template-columns: 1fr; }
    .filter-bar .actions { align-items: stretch; }
    .filter-bar .btn { flex: 1; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: .01ms !important;
      animation-iteration-count: 1 !important;
      scroll-behavior: auto !important;
    }
  }
</style>
</head>
<body>

{% if user.is_authenticated %}
<nav>
  <span class="brand">DocTracker</span>
  <a href="{% url 'dashboard' %}">Dashboard</a>
  <a href="{% url 'document_list' %}">Documents</a>
  <a href="{% url 'category_list' %}">Categories</a>
  <span class="spacer"></span>
  <span class="user">{{ user.username }}</span>
  <a href="{% url 'logout' %}">Logout</a>
</nav>
{% endif %}

<div class="container">
  {% for message in messages %}
    <div class="alert alert-{{ message.tags|default:'success' }}">{{ message }}</div>
  {% endfor %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
